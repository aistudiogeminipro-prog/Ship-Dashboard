<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海洋動態監控系統 (Ship Dynamic Dashboard)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* 懸浮控制面板 - 移至右上角 */
        #control-panel {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px);
            border: 1px solid #334155; border-radius: 12px; 
            width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            overflow: hidden; transition: all 0.3s ease;
        }

        /* 控制面板標題列 (可點擊摺疊) */
        #panel-header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; background: rgba(30, 41, 59, 0.5); border-bottom: 1px solid transparent;
        }
        #panel-header:hover { background: rgba(30, 41, 59, 0.8); }
        #panel-header.expanded { border-bottom: 1px solid #334155; }
        
        /* 控制面板內容區 */
        #panel-content {
            padding: 0 20px 20px 20px;
            max-height: 0; opacity: 0; overflow: hidden;
            transition: max-height 0.4s ease, opacity 0.4s ease, padding 0.4s ease;
        }
        #panel-content.show {
            max-height: 500px; opacity: 1; padding: 15px 20px 20px 20px;
        }
        
        .toggle-icon { transition: transform 0.3s; }
        .toggle-icon.rotated { transform: rotate(180deg); }

        .file-upload-btn {
            display: inline-block; width: 100%; padding: 10px;
            background: #2563eb; color: white; text-align: center;
            border-radius: 8px; cursor: pointer; transition: background 0.3s; font-weight: bold;
        }
        .file-upload-btn:hover { background: #1d4ed8; }
        input[type="file"] { display: none; }

        /* Leaflet Popup 樣式自訂 */
        .leaflet-popup-content-wrapper { background: #1e293b; color: #f8fafc; border-radius: 8px; border: 1px solid #475569; padding: 0; }
        .leaflet-popup-content { margin: 15px; }
        .leaflet-popup-tip { background: #1e293b; }
        
        .popup-title { font-size: 16px; font-weight: bold; color: #38bdf8; border-bottom: 2px solid #0ea5e9; padding-bottom: 5px; margin-bottom: 10px; }
        
        /* 捲軸容器，確保內容過多時可滑動 */
        .popup-scroll-container {
            max-height: 280px; overflow-y: auto; padding-right: 5px;
        }
        
        /* 自訂捲軸樣式 */
        .popup-scroll-container::-webkit-scrollbar { width: 6px; }
        .popup-scroll-container::-webkit-scrollbar-track { background: #1e293b; }
        .popup-scroll-container::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        .popup-scroll-container::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .popup-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .popup-table th { text-align: left; padding: 6px; border-bottom: 1px solid #334155; color: #94a3b8; width: 40%; white-space: nowrap; }
        .popup-table td { text-align: left; padding: 6px; border-bottom: 1px solid #334155; font-weight: 500; }
        
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8); z-index: 2000;
            display: none; justify-content: center; align-items: center; flex-direction: column;
        }
        .loader { border: 4px solid #334155; border-top: 4px solid #38bdf8; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader mb-4"></div>
        <div id="loading-text" class="text-xl font-bold text-sky-400">正在從伺服器載入最新戰情資料...</div>
        <div class="text-sm text-slate-400 mt-2">資料同步中，可能需要 15~30 秒，請稍候。</div>
    </div>

    <div id="control-panel">
        <div id="panel-header" onclick="togglePanel()">
            <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-sky-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                <h1 class="text-lg font-bold text-sky-400 m-0">功能選單</h1>
            </div>
            <svg id="toggle-icon" class="toggle-icon w-5 h-5 text-slate-300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
        
        <div id="panel-content">
            <p class="text-xs text-slate-400 mb-4">Tactical Ship Dynamic Dashboard</p>
            
            <label class="file-upload-btn mb-4">
                <input type="file" id="geojson-input" accept=".geojson,.json" />
                <span id="upload-text">手動匯入 GeoJSON (備用)</span>
            </label>

            <div class="grid grid-cols-2 gap-2 text-sm bg-slate-800 p-3 rounded-lg border border-slate-700">
                <div class="text-slate-400">當前標定數量</div>
                <div class="text-right font-bold text-emerald-400" id="ship-count">0 艘</div>
                <div class="text-slate-400">資料來源</div>
                <div class="text-right font-bold text-white text-xs truncate" id="data-source">等待載入</div>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        // 面板收合邏輯
        function togglePanel() {
            const content = document.getElementById('panel-content');
            const icon = document.getElementById('toggle-icon');
            const header = document.getElementById('panel-header');
            
            content.classList.toggle('show');
            icon.classList.toggle('rotated');
            header.classList.toggle('expanded');
        }

        const map = L.map('map').setView([23.5, 121.0], 6);
        L.tileLayer('https://mt1.google.com/vt/lyrs=m&hl=zh-TW&x={x}&y={y}&z={z}', {
            maxZoom: 20, attribution: '&copy; Google Maps'
        }).addTo(map);

        let geojsonLayer = null;

        // --- 新增：載入 Github Repo 內的 4 個固定 GeoJSON 圖層 ---
        function loadPredefinedLayers() {
            // 定義檔案名稱與對應顏色
            const predefinedFiles = [
                { url: '6.geojson', color: '#3b82f6' }, // 藍色
                { url: '12.geojson', color: '#3b82f6' }, // 藍色
                { url: '8.geojson', color: '#22c55e' }, // 綠色
                { url: '24.geojson', color: '#22c55e' }  // 綠色
            ];

            predefinedFiles.forEach(file => {
                fetch(file.url)
                    .then(response => {
                        if (!response.ok) throw new Error(`找不到檔案: ${file.url}`);
                        return response.json();
                    })
                    .then(data => {
                        L.geoJSON(data, {
                            // 設定多邊形或線條樣式 (半透明)
                            style: {
                                color: file.color,       // 邊框顏色
                                weight: 2,               // 邊框寬度
                                opacity: 0.8,            // 邊框透明度
                                fillColor: file.color,   // 內部填充顏色
                                fillOpacity: 0.3         // 內部半透明度 (0.3代表30%)
                            },
                            // 如果圖層內容是點位 (Point)，則繪製圓點
                            pointToLayer: function (feature, latlng) {
                                return L.circleMarker(latlng, {
                                    radius: 6,
                                    fillColor: file.color,
                                    color: "#ffffff",
                                    weight: 1,
                                    opacity: 1,
                                    fillOpacity: 0.7
                                });
                            }
                        }).addTo(map);
                    })
                    .catch(err => console.warn("載入固定圖層時發生錯誤:", err));
            });
        }

        // 初始化載入固定圖層
        loadPredefinedLayers();
        // ----------------------------------------------------

        // 主資料(船隻點位)預設樣式 (紅色)
        const markerOptions = {
            radius: 6, fillColor: "#ef4444", color: "#ffffff", weight: 2, opacity: 1, fillOpacity: 0.8
        };

        function renderGeoJSON(data, sourceName) {
            if (geojsonLayer) map.removeLayer(geojsonLayer);
            
            geojsonLayer = L.geoJSON(data, {
                pointToLayer: (feature, latlng) => L.circleMarker(latlng, markerOptions),
                onEachFeature: (feature, layer) => {
                    const props = feature.properties;
                    
                    const infoList = [
                        { label: '船名', val: props.shipname },
                        { label: 'MMSI', val: props.mmsi },
                        { label: 'IMO', val: props.imo },
                        { label: '國籍', val: props.country },
                        { label: '船舶類型', val: props.type_name },
                        { label: '船長', val: props.vsl_length ? props.vsl_length + ' m' : '' },
                        { label: '吃水深度', val: props.draught ? props.draught + ' m' : '' },
                        { label: '航速', val: props.speed ? props.speed + ' 節' : '' },
                        { label: '航向', val: props.course ? props.course + ' °' : '' },
                        { label: '經度', val: props.ship_lon },
                        { label: '緯度', val: props.ship_lat },
                        { label: '最新時間', val: props.last_pos },
                        { label: '出發港口', val: props.last_port_name },
                        { label: '離港時間', val: props.departure_port_info_portTime },
                        { label: '下一港口', val: props.next_port_name },
                        { label: '目標區域', val: props.arrival_port_info_label },
                        { label: '預估抵達', val: props.arrival_time_datetime }
                    ];

                    let tableRows = '';
                    infoList.forEach(item => {
                        const displayVal = (item.val === null || item.val === undefined || item.val === '') ? 'N/A' : item.val;
                        let colorClass = '';
                        if (item.label === '最新時間') colorClass = 'text-emerald-400';
                        if (item.label === '目標區域') colorClass = 'text-sky-400';
                        
                        tableRows += `<tr><th>${item.label}</th><td class="${colorClass}">${displayVal}</td></tr>`;
                    });

                    layer.bindPopup(`
                        <div class="popup-title">${props.shipname || '未知船名'}</div>
                        <div class="popup-scroll-container">
                            <table class="popup-table">
                                ${tableRows}
                            </table>
                        </div>
                    `, { minWidth: 320 });
                }
            }).addTo(map);

            map.fitBounds(geojsonLayer.getBounds(), { padding: [50, 50] });
            document.getElementById('ship-count').innerText = `${data.features.length} 艘`;
            document.getElementById('data-source').innerText = sourceName;
        }

        // 解析網址並自動載入主資料
        const urlParams = new URLSearchParams(window.location.search);
        const autoLoadFile = urlParams.get('file');

        if (autoLoadFile) {
            document.getElementById('loading-overlay').style.display = 'flex';
            const fetchUrl = `${autoLoadFile}?t=${new Date().getTime()}`;
            
            fetch(fetchUrl)
                .then(response => {
                    if (!response.ok) throw new Error('檔案尚未準備好或不存在');
                    return response.json();
                })
                .then(data => {
                    renderGeoJSON(data, '雲端自動同步');
                    document.getElementById('loading-overlay').style.display = 'none';
                })
                .catch(error => {
                    document.getElementById('loading-text').innerText = "檔案同步中，請稍候 30 秒後重新整理網頁！";
                    console.error('Fetch Error:', error);
                });
        }

        // 手動匯入 (備用功能)
        document.getElementById('geojson-input').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    renderGeoJSON(data, '本機手動上傳');
                } catch (error) { alert("檔案解析失敗！"); }
            };
            reader.readAsText(file);
        });
    </script>
</body>
</html>
