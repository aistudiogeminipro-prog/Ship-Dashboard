<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海洋動態監控系統 (Ship Dynamic Dashboard)</title>
    
    <!-- 引入 Leaflet 地圖套件 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- 引入 Tailwind CSS (快速排版) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        #control-panel {
            position: absolute; top: 20px; left: 60px; z-index: 1000;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            border: 1px solid #334155; border-radius: 12px; padding: 20px;
            width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .file-upload-btn {
            display: inline-block; width: 100%; padding: 10px;
            background: #2563eb; color: white; text-align: center;
            border-radius: 8px; cursor: pointer; transition: background 0.3s; font-weight: bold;
        }
        .file-upload-btn:hover { background: #1d4ed8; }
        input[type="file"] { display: none; }

        .leaflet-popup-content-wrapper { background: #1e293b; color: #f8fafc; border-radius: 8px; border: 1px solid #475569; }
        .leaflet-popup-tip { background: #1e293b; }
        .popup-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        .popup-table th { text-align: left; padding: 6px; border-bottom: 1px solid #334155; color: #94a3b8; width: 40%; }
        .popup-table td { text-align: left; padding: 6px; border-bottom: 1px solid #334155; font-weight: 500; }
        .popup-title { font-size: 16px; font-weight: bold; color: #38bdf8; border-bottom: 2px solid #0ea5e9; padding-bottom: 5px; margin-bottom: 5px; }
        
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8); z-index: 2000;
            display: none; justify-content: center; align-items: center; flex-direction: column;
        }
        .loader { border: 4px solid #334155; border-top: 4px solid #38bdf8; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader mb-4"></div>
        <div id="loading-text" class="text-xl font-bold text-sky-400">正在從伺服器載入最新戰情資料...</div>
        <div class="text-sm text-slate-400 mt-2">若持續載入中，可能是 GitHub Pages 仍在背景發布 (約需1分鐘)</div>
    </div>

    <div id="control-panel">
        <h1 class="text-xl font-bold mb-1 text-sky-400">海洋動態監控圖臺</h1>
        <p class="text-xs text-slate-400 mb-4">Tactical Ship Dynamic Dashboard</p>
        
        <label class="file-upload-btn mb-4">
            <input type="file" id="geojson-input" accept=".geojson,.json" />
            <span id="upload-text">手動匯入 GeoJSON (備用)</span>
        </label>

        <div class="grid grid-cols-2 gap-2 text-sm bg-slate-800 p-3 rounded-lg border border-slate-700">
            <div class="text-slate-400">當前標定數量</div>
            <div class="text-right font-bold text-emerald-400" id="ship-count">0 艘</div>
            <div class="text-slate-400">資料來源</div>
            <div class="text-right font-bold text-white" id="data-source">等待載入</div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        const map = L.map('map').setView([23.5, 121.0], 6);
        L.tileLayer('https://mt1.google.com/vt/lyrs=m&hl=zh-TW&x={x}&y={y}&z={z}', {
            maxZoom: 20, attribution: '&copy; Google Maps'
        }).addTo(map);

        let geojsonLayer = null;

        const markerOptions = {
            radius: 6, fillColor: "#ef4444", color: "#ffffff", weight: 2, opacity: 1, fillOpacity: 0.8
        };

        function renderGeoJSON(data, sourceName) {
            if (geojsonLayer) map.removeLayer(geojsonLayer);
            
            geojsonLayer = L.geoJSON(data, {
                pointToLayer: (feature, latlng) => L.circleMarker(latlng, markerOptions),
                onEachFeature: (feature, layer) => {
                    const props = feature.properties;
                    layer.bindPopup(`
                        <div class="popup-title">${props.shipname || '未知船名'}</div>
                        <table class="popup-table">
                            <tr><th>MMSI / IMO</th><td>${props.mmsi} / ${props.imo || 'N/A'}</td></tr>
                            <tr><th>國籍</th><td>${props.country || 'N/A'}</td></tr>
                            <tr><th>船種類型</th><td>${props.type_name || 'N/A'}</td></tr>
                            <tr><th>最新訊號</th><td class="text-emerald-400">${props.last_pos}</td></tr>
                            <tr><th>航速 / 航向</th><td>${props.speed} 節 / ${props.course}°</td></tr>
                            <tr><th>吃水深度</th><td>${props.draught} m</td></tr>
                            <tr><th>出發港口</th><td>${props.last_port_name || '未知'}</td></tr>
                            <tr><th>預估抵達</th><td>${props.arrival_time_datetime || 'N/A'}</td></tr>
                        </table>
                    `, { minWidth: 280 });
                }
            }).addTo(map);

            map.fitBounds(geojsonLayer.getBounds(), { padding: [50, 50] });
            document.getElementById('ship-count').innerText = `${data.features.length} 艘`;
            document.getElementById('data-source').innerText = sourceName;
        }

        // ================= 核心：解析網址並自動載入 =================
        const urlParams = new URLSearchParams(window.location.search);
        const autoLoadFile = urlParams.get('file');

        if (autoLoadFile) {
            document.getElementById('loading-overlay').style.display = 'flex';
            
            // 加上時間戳防止瀏覽器快取舊檔案
            const fetchUrl = `${autoLoadFile}?t=${new Date().getTime()}`;
            
            fetch(fetchUrl)
                .then(response => {
                    if (!response.ok) throw new Error('檔案尚未準備好或不存在');
                    return response.json();
                })
                .then(data => {
                    renderGeoJSON(data, '自動連線 (Telegram)');
                    document.getElementById('loading-overlay').style.display = 'none';
                })
                .catch(error => {
                    document.getElementById('loading-text').innerText = "檔案同步中，請稍候 30 秒後重新整理網頁！";
                    console.error('Fetch Error:', error);
                });
        }

        // 手動匯入 (備用功能)
        document.getElementById('geojson-input').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    renderGeoJSON(data, '本機手動上傳');
                } catch (error) { alert("檔案解析失敗！"); }
            };
            reader.readAsText(file);
        });
    </script>
</body>
</html>
